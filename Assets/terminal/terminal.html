<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self' https://tfx.terminal; script-src 'self' https://tfx.terminal 'unsafe-inline'; style-src 'self' https://tfx.terminal 'unsafe-inline'; img-src data:;" />
<link rel="stylesheet" href="xterm.css" />
<script src="xterm.js"></script>
<script src="addon-fit.js"></script>
<script src="addon-unicode11.js"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: transparent;
    font-family: "Cascadia Mono", Consolas, monospace;
  }
  #root { display: flex; flex-direction: column; height: 100%; width: 100%; }
  /* Tab strip — shown only once the Output tab has content. */
  #tabs {
    display: none;
    flex: 0 0 auto;
    background: rgba(0,0,0,0.25);
  }
  #tabs.visible { display: flex; }
  .tab {
    padding: 3px 14px;
    font-size: 12px;
    color: #8F9BA8;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    user-select: none;
  }
  .tab.active { color: #FFFFFF; border-bottom-color: #7DD3FC; }
  #panes { position: relative; flex: 1 1 auto; min-height: 0; }
  .pane {
    position: absolute; inset: 0;
    /* Extra bottom padding gives the last row clearance so it is never clipped
       by the container's bottom edge (FitAddon subtracts this padding). */
    padding: 4px 4px 8px 4px;
    box-sizing: border-box;
    display: none;
  }
  .pane.active { display: block; }
</style>
</head>
<body>
<div id="root">
  <div id="tabs">
    <div class="tab active" id="tab-shell" data-target="shell">Shell</div>
    <div class="tab" id="tab-output" data-target="output">Output</div>
  </div>
  <div id="panes">
    <div class="pane active" id="pane-shell"></div>
    <div class="pane" id="pane-output"></div>
  </div>
</div>
<script>
(function () {
  "use strict";

  // Two terminals: "shell" is the interactive ConPTY session; "output" is a
  // read-only sink for the stdout/stderr of [[commands]] run with terminal=true.
  // Host → page messages carry an optional "target" ("shell" default / "output").
  var terms = { shell: null, output: null };
  var fits = { shell: null, output: null };
  var pending = { shell: [], output: [] };
  var ready = false;
  var activeTab = "shell";
  var outputUsed = false;   // reveal the tab strip once Output has content
  var pendingActivate = null;  // tab requested before init finished
  // {ctrl,shift,alt,key} combo that returns focus to the file list. Sent by the
  // host from config.toml [shortcuts] focusFilePane. WebView2 owns most keys, so
  // the shell intercepts this one and tells the host to focus the file pane.
  var focusFilesKey = null;

  function post(obj) {
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(JSON.stringify(obj));
    }
  }

  function b64ToBytes(b64) {
    var bin = atob(b64);
    var len = bin.length;
    var bytes = new Uint8Array(len);
    for (var i = 0; i < len; i++) {
      bytes[i] = bin.charCodeAt(i);
    }
    return bytes;
  }

  function bytesToB64(str) {
    var utf8 = new TextEncoder().encode(str);
    var bin = "";
    for (var i = 0; i < utf8.length; i++) {
      bin += String.fromCharCode(utf8[i]);
    }
    return btoa(bin);
  }

  function init(options) {
    try {
      initInner(options);
    } catch (err) {
      post({ type: "error", message: String(err && err.stack || err) });
    }
  }

  function makeTerminal(options, interactive) {
    var theme = options.theme || {};
    var term = new Terminal({
      fontFamily: options.fontFamily || "Cascadia Mono, Consolas, monospace",
      fontSize: options.fontSize || 14,
      cursorBlink: interactive,
      disableStdin: !interactive,
      allowProposedApi: true,
      allowTransparency: options.allowTransparency !== false,
      scrollback: options.scrollback || 5000,
      theme: theme
    });
    var fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    try {
      var unicode = new Unicode11Addon.Unicode11Addon();
      term.loadAddon(unicode);
      term.unicode.activeVersion = "11";
    } catch (e) { /* unicode addon optional */ }
    return { term: term, fit: fit };
  }

  function matchesKey(e, spec) {
    if (!spec || !spec.key) { return false; }
    if (!!spec.ctrl !== !!e.ctrlKey) { return false; }
    if (!!spec.shift !== !!e.shiftKey) { return false; }
    if (!!spec.alt !== !!e.altKey) { return false; }
    return (e.key || "").toLowerCase() === String(spec.key).toLowerCase();
  }

  function initInner(options) {
    options = options || {};
    focusFilesKey = options.focusFilesKey || null;

    var shell = makeTerminal(options, true);
    terms.shell = shell.term;
    fits.shell = shell.fit;
    shell.term.open(document.getElementById("pane-shell"));

    var output = makeTerminal(options, false);
    terms.output = output.term;
    fits.output = output.fit;
    output.term.open(document.getElementById("pane-output"));

    fitAll();

    // Copy / paste / interrupt handling on the interactive shell only.
    terms.shell.attachCustomKeyEventHandler(function (e) {
      if (e.type !== "keydown") { return true; }
      // Return focus to the file list (checked before the Ctrl-only handling so
      // a non-Ctrl binding still works).
      if (matchesKey(e, focusFilesKey)) {
        post({ type: "focusFiles" });
        e.preventDefault();
        return false;
      }
      if (!e.ctrlKey || e.altKey || e.metaKey) {
        return true;
      }
      var k = (e.key || "").toLowerCase();
      var isC = k === "c" || e.keyCode === 67;
      var isV = k === "v" || e.keyCode === 86;
      if (e.shiftKey) {
        if (isC) { copySelection(); e.preventDefault(); return false; }
        if (isV) { pasteClipboard(); e.preventDefault(); return false; }
        return true;
      }
      if (isC) {
        if (terms.shell.hasSelection()) {
          copySelection();
          terms.shell.clearSelection();
        } else {
          post({ type: "input", dataB64: bytesToB64("") });  // 0x03 = Ctrl+C
        }
        e.preventDefault();
        return false;
      }
      if (isV) { pasteClipboard(); e.preventDefault(); return false; }
      return true;
    });

    // Interactive input → host (output terminal is read-only, no onData wiring).
    terms.shell.onData(function (data) {
      post({ type: "input", dataB64: bytesToB64(data) });
    });
    terms.shell.onResize(function (size) {
      post({ type: "resize", cols: size.cols, rows: size.rows });
    });

    ready = true;
    flush("shell");
    flush("output");

    post({ type: "resize", cols: terms.shell.cols, rows: terms.shell.rows });
    post({ type: "ready" });

    // Re-fit after the font is ready and after layout settles. The first fit can
    // run before the WebView has its final size / before glyph metrics are final,
    // which otherwise leaves the bottom row clipped.
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(function () { fitAll(); });
    }
    setTimeout(function () { fitAll(); }, 50);
    setTimeout(function () { fitAll(); }, 250);

    // Apply a tab switch requested before init finished (e.g. a command opened
    // the pane to show its Output); otherwise default to the Shell tab.
    if (pendingActivate) {
      var t = pendingActivate;
      pendingActivate = null;
      activate(t);
    } else {
      terms.shell.focus();
    }
  }

  function flush(target) {
    var t = terms[target];
    if (!t) { return; }
    var buf = pending[target];
    for (var i = 0; i < buf.length; i++) {
      t.write(buf[i]);
    }
    pending[target] = [];
  }

  function copySelection() {
    var t = terms.shell;
    if (t && t.hasSelection() && navigator.clipboard) {
      navigator.clipboard.writeText(t.getSelection());
    }
  }

  function pasteClipboard() {
    if (navigator.clipboard && navigator.clipboard.readText) {
      navigator.clipboard.readText().then(function (text) {
        if (text) {
          post({ type: "input", dataB64: bytesToB64(text) });
        }
      }).catch(function () { /* permission denied / empty */ });
    }
  }

  function write(target, bytes) {
    if (ready && terms[target]) {
      terms[target].write(bytes);
    } else {
      pending[target].push(bytes);
    }
    if (target === "output" && !outputUsed) {
      outputUsed = true;
      document.getElementById("tabs").classList.add("visible");
      fitAll();
    }
  }

  function fitAll() {
    fitOne("shell");
    fitOne("output");
  }
  function fitOne(target) {
    var f = fits[target];
    if (!f) { return; }
    try { f.fit(); } catch (e) { return; /* ignore pre-layout fit */ }

    // FitAddon computes rows from a theoretical cell height, but the DOM renderer
    // rounds each row up to whole pixels, so rows * actualRowHeight can exceed the
    // measured area and clip the bottom row. Re-measure the real rendered row
    // height and drop a row if the rows no longer fit.
    try {
      var t = terms[target];
      var pane = document.getElementById(target === "output" ? "pane-output" : "pane-shell");
      if (!t || !pane) { return; }
      var rowEl = pane.querySelector(".xterm-rows > div");
      if (!rowEl) { return; }
      var cellH = rowEl.getBoundingClientRect().height;
      if (cellH <= 0) { return; }
      var cs = window.getComputedStyle(pane);
      var avail = pane.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
      var fitRows = Math.max(1, Math.floor(avail / cellH));
      if (t.rows > fitRows) {
        t.resize(t.cols, fitRows);
      }
    } catch (e) { /* best effort */ }
  }

  function activate(target) {
    if (target !== "shell" && target !== "output") { return; }
    // Before init builds the terminals, remember the request and apply it once
    // ready (otherwise the tab switch happens against not-yet-opened panes).
    if (!ready) {
      pendingActivate = target;
      return;
    }
    activeTab = target;
    document.getElementById("tab-shell").classList.toggle("active", target === "shell");
    document.getElementById("tab-output").classList.toggle("active", target === "output");
    document.getElementById("pane-shell").classList.toggle("active", target === "shell");
    document.getElementById("pane-output").classList.toggle("active", target === "output");
    fitOne(target);
    if (terms[target]) { terms[target].focus(); }
  }

  // Tells the host the Shell tab is in view so it can lazily start the shell
  // (the pane may have been opened only to show command output). Sent ONLY for
  // explicit user actions (tab click), not for host-driven focus/activate — so a
  // focus message can't accidentally spin up a shell in output-only mode.
  function requestShell() {
    post({ type: "shellActivated", cols: terms.shell ? terms.shell.cols : 80, rows: terms.shell ? terms.shell.rows : 25 });
  }

  // Tab clicks.
  document.getElementById("tabs").addEventListener("click", function (e) {
    var t = e.target && e.target.getAttribute && e.target.getAttribute("data-target");
    if (t) {
      activate(t);
      if (t === "shell") { requestShell(); }
    }
  });

  var resizeObserver = new ResizeObserver(function () { fitOne(activeTab); });
  resizeObserver.observe(document.getElementById("panes"));

  // Host → page dispatcher.
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener("message", function (e) {
      var msg;
      try { msg = JSON.parse(e.data); } catch (err) { return; }
      var target = msg.target === "output" ? "output" : "shell";
      switch (msg.type) {
        case "init": init(msg.options); break;
        case "output": write(target, b64ToBytes(msg.dataB64)); break;
        case "fit": fitOne(activeTab); break;
        case "focus": activate("shell"); break;
        case "activate": activate(target); break;
        case "reset":
          // Shell torn down (pane closed). Clear it and re-fit; the resulting
          // onResize tells the host to spawn a fresh PTY on next open. Tab
          // activation is left to the host (focus / activate messages) so a
          // command-triggered open can land on the Output tab.
          if (terms.shell) {
            terms.shell.reset();
            pending.shell = [];
            fitOne("shell");
            post({ type: "resize", cols: terms.shell.cols, rows: terms.shell.rows });
          }
          break;
        case "clearOutput":
          if (terms.output) { terms.output.reset(); pending.output = []; }
          break;
      }
    });
  }

  post({ type: "loaded" });
})();
</script>
</body>
</html>
